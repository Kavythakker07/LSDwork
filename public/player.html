<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>Course Player</title>
  <link rel="stylesheet" href="https://vjs.zencdn.net/8.6.1/video-js.css" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      -webkit-touch-callout: none;
      user-select: none;
    }

    #player {
      width: 100vw;
      height: 100vh;
      position: relative; /* Needed for absolute children */
    }

    .vjs-control-bar {
      font-size: 1.5em;
    }

    .vjs-next-button.vjs-control {
      background: none;
      border: none;
      padding: 0 12px;
      color: white;
      cursor: pointer;
      font-size: 1.2em;
    }

    .vjs-next-button:hover {
      color: #1db954;
    }

    .vjs-progress-control {
      flex: 1 1 auto !important;
    }

    .vjs-volume-panel,
    .vjs-fullscreen-control {
      flex: 0 0 auto !important;
    }

    .vjs-control {
      min-width: auto !important;
    }

    .custom-modal,
    .skip-icon {
      position: absolute;
      z-index: 9999;
      user-select: none;
    }

    .custom-modal {
      display: none;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.5);
      justify-content: center;
      align-items: center;
    }

    .custom-modal-content {
      background-color: #fff;
      padding: 20px 30px;
      border: 1px solid #888;
      width: 300px;
      text-align: center;
      border-radius: 8px;
    }

    .custom-modal-content button {
      margin-top: 15px;
      padding: 6px 14px;
      border: none;
      background-color: #444;
      color: #fff;
      border-radius: 4px;
      cursor: pointer;
    }

    .custom-modal-content button:hover {
      background-color: #222;
    }

    .skip-icon {
      top: 50%;
      transform: translateY(-50%);
      font-size: 2.5rem;
      color: white;
      background: rgba(0,0,0,0.5);
      padding: 8px 14px;
      border-radius: 8px;
      display: none;
    }

    #skip-left { left: 20%; }
    #skip-right { right: 20%; }
  </style>
</head>

<body oncontextmenu="return false">
  <div style="height: 100vh; width: 100vw;">
    <video id="player" class="video-js" controls preload="auto" playsinline webkit-playsinline crossorigin>
      <source src="" id="videoSource" type="video/mp4" />
    </video>

    <!-- Skip icons inside player -->
    <div id="skip-left" class="skip-icon">⏪ -10s</div>
    <div id="skip-right" class="skip-icon">+10s ⏩</div>

    <!-- Modals inside video container -->
    <div id="noNextModal" class="custom-modal"><div class="custom-modal-content">
      <p>No next video found.</p>
      <button onclick="closeModal('noNextModal')">OK</button>
    </div></div>

    <div id="noPrevModal" class="custom-modal"><div class="custom-modal-content">
      <p>No previous video found.</p>
      <button onclick="closeModal('noPrevModal')">OK</button>
    </div></div>
  </div>

  <script src="https://vjs.zencdn.net/8.6.1/video.min.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const filename = params.get('video');
    const courseName = params.get('courseName');

    const src = document.getElementById('videoSource');
    if (!filename) {
      alert('⚠️ No video provided');
      throw new Error('No video specified');
    }
    src.src = `/uploads/videos/${filename.endsWith('.mp4') ? filename : filename + '.mp4'}`;

    const player = videojs('player', {
      controlBar: {
        children: [
          'playToggle',
          'progressControl',
          'currentTimeDisplay',
          'timeDivider',
          'durationDisplay',
          'volumePanel',
          'fullscreenToggle'
        ]
      }
    });

    const skipLeftIcon = document.getElementById('skip-left');
    const skipRightIcon = document.getElementById('skip-right');

    function showSkipIcon(icon) {
      icon.style.display = 'block';
      setTimeout(() => { icon.style.display = 'none'; }, 500);
    }

    function showModal(id) {
      document.getElementById(id).style.display = 'flex';
    }

    function closeModal(id) {
      document.getElementById(id).style.display = 'none';
      enterFullscreenAndRotate(); // optional: go fullscreen again
    }

    function exitFullscreenIfActive() {
      if (document.fullscreenElement || document.webkitFullscreenElement) {
        if (document.exitFullscreen) {
          document.exitFullscreen();
        } else if (document.webkitExitFullscreen) {
          document.webkitExitFullscreen();
        }
      }
    }

    function enterFullscreenAndRotate() {
      const vid = player.el();
      if (vid.requestFullscreen) {
        vid.requestFullscreen();
      } else if (vid.webkitRequestFullscreen) {
        vid.webkitRequestFullscreen();
      }
      if (screen.orientation && screen.orientation.lock) {
        screen.orientation.lock("landscape").catch(() => {});
      }
    }

    player.ready(() => {
      player.play();

      const cb = player.getChild('controlBar');
      const idx = cb.children_.findIndex(c => c.name_ === 'playToggle');

      const backBtn = videojs.dom.createEl('button', {
        className: 'vjs-next-button vjs-control',
        innerHTML: '⏮',
        title: 'Previous Video'
      });

      const nextBtn = videojs.dom.createEl('button', {
        className: 'vjs-next-button vjs-control',
        innerHTML: '⏭',
        title: 'Next Video'
      });

      backBtn.onclick = async () => {
        player.pause();
        try {
          const res = await fetch('/api/auth/next_prev', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ current: filename, courseName, order: "prev" }),
          });
          const data = await res.json();
          if (data.previous) {
            window.location.href = `?video=${data.previous}&courseName=${courseName}`;
          } else {
            exitFullscreenIfActive();
            showModal('noPrevModal');
          }
        } catch (err) {
          console.error('Error fetching previous video:', err);
        }
      };

      nextBtn.onclick = async () => {
        player.pause();
        try {
          const res = await fetch('/api/auth/next_prev', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ current: filename, courseName, order: "next" }),
          });
          const data = await res.json();
          if (data.next) {
            window.location.href = `?video=${data.next}&courseName=${courseName}`;
          } else {
            exitFullscreenIfActive();
            showModal('noNextModal');
          }
        } catch (err) {
          console.error('Error fetching next video:', err);
        }
      };

      cb.el().insertBefore(backBtn, cb.children_[idx + 1].el_);
      cb.el().insertBefore(nextBtn, cb.children_[idx + 1].el_);

      // Auto enter fullscreen on play
      player.on('play', () => {
        enterFullscreenAndRotate();
      });
    });

    // Double-tap skip
    let lastLeft = 0, lastRight = 0;
    player.el().addEventListener('touchstart', e => {
      const x = e.touches[0].clientX;
      const w = window.innerWidth;
      const now = Date.now();

      if (x < w / 2) {
        if (now - lastLeft < 400) {
          player.currentTime(player.currentTime() - 10);
          showSkipIcon(skipLeftIcon);
        }
        lastLeft = now;
      } else {
        if (now - lastRight < 400) {
          player.currentTime(player.currentTime() + 10);
          showSkipIcon(skipRightIcon);
        }
        lastRight = now;
      }
    });
  </script>
</body>
</html>
